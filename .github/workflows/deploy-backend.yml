# PR-17 — Worker 자동 배포.
#
# main 푸시: production 배포 (`wrangler deploy`).
# PR 이벤트: preview 환경 (`wrangler deploy --env preview`) + PR 코멘트로
# preview URL 안내. preview bucket 은 별도 (`bugzar-artifacts-preview`).

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::group::Preview deploy"
            pnpm --filter @bugzar/backend exec wrangler deploy --env preview
            echo "url=https://bugzar-backend-preview.workers.dev" >> "$GITHUB_OUTPUT"
            echo "::endgroup::"
          else
            echo "::group::Production deploy"
            pnpm --filter @bugzar/backend exec wrangler deploy
            echo "url=https://bugzar-backend.workers.dev" >> "$GITHUB_OUTPUT"
            echo "::endgroup::"
          fi

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- bugzar-backend-preview -->';
            const body = `${marker}\n🚀 Backend preview deployed: <${url}>\n\nTry it:\n\`\`\`\ncurl ${url}/__state\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
